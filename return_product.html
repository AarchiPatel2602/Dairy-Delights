    <script>
        document.getElementById('return-form').addEventListener('submit', async function(event) {
            event.preventDefault();
            let formData = new FormData(this);

            try {
                const response = await fetch('submit_return.php', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    alert('Return request submitted successfully!');
                    window.location.href = 'HOME.html';  // Redirect to home page
                } else {
                    document.getElementById('error-message').innerText = data.message || 'There was an error submitting your return request.';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('error-message').innerText = 'An error occurred. Please try again later.';
            }
        });
    </script>
