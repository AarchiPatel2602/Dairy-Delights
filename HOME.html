<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dairy Delights | Fresh & Organic</title>
    <script src="script.js" defer></script>

    <style>
        /* General Styling */
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff4e1, #ffe3c1);
            margin: 0;
            padding: 0;
            color: #333;
            transition: all 0.3s ease;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            height: 100%;
            background: linear-gradient(135deg, #f9a15c, #fbbd74);
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            padding: 15px 20px;
            width: 100%;
            text-align: left;
            transition: background 0.3s ease;
        }

        .sidebar a:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: translateX(10px);
        }

        .sidebar .sidebar-header {
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 40px;
            text-align: center;
        }

        .sidebar-toggle {
            font-size: 30px;
            background: none;
            border: none;
            color: white;
            margin-left: 20px;
            display: none;
        }

        .content {
            margin-left: 250px;
            padding: 20px;
            flex-grow: 1;
        }

        /* Toggle Button for Small Screens */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-250px); /* Initially hidden */
                position: absolute;
            }

            .sidebar.show {
                transform: translateX(0);
            }

            .sidebar-toggle {
                display: block;
                position: absolute;
                top: 20px;
                left: 20px;
                cursor: pointer;
            }

            .content {
                margin-left: 0;
                padding: 20px;
            }
        }

        /* Product List */
        .product-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 40px 20px;
            justify-items: center;
        }

        .product {
            background: #fffdf8;
            width: 100%;
            height: 430px;
            border-radius: 18px;
            box-shadow: 0 6px 18px rgba(255, 153, 51, 0.15);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(255, 140, 0, 0.25);
        }

        .product img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .product h2 {
            font-size: 22px;
            padding: 10px 0 0;
            color: #333;
        }

        .product p {
            font-size: 15px;
            color: #666;
            padding: 0 15px;
        }

        .product .price {
            font-size: 20px;
            color: #ff8800;
            font-weight: 700;
            margin: 8px 0;
        }

        .product button {
            background: linear-gradient(135deg, #ff9f50, #f6862a);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            cursor: pointer;
            font-size: 17px;
            border-radius: 0 0 18px 18px;
            transition: all 0.3s ease;
        }

        .product button:hover {
            background: linear-gradient(135deg, #f6862a, #ff9f50);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">Dairy Delights</div>
        <a href="cart.html">Cart</a>
        <a href="order_status.php">Order Status</a>
        <a href="your_subscriptions.php">Your Subscriptions</a>
        <a href="about.html">About Us</a>
        <a href="return_product.php">Return Product</a>
        <a href="login.html">Login</a>
        <a href="contact.html">Contact Us</a>
        <a href="profile.html">Profile</a>
    </div>

    <!-- Toggle Button for Sidebar -->
    <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">☰</button>

    <!-- Main Content -->
    <div class="content">
        <div style="background: linear-gradient(135deg, #ffb347, #ffcc33); 
                    color: #774c1a; 
                    padding: 12px; 
                    text-align: center; 
                    font-size: 18px; 
                    font-weight: bold; 
                    border-radius: 8px; 
                    margin-top: 10px; 
                    box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);">
            🎉 Use <strong>DAIRY20</strong> to get <strong>20% OFF</strong> on your first order! 🛒
        </div>

        <section class="product-list" id="product-list">
        </section>
    </div>

    <script>
        // Toggle sidebar visibility
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('show');
        }
    </script>
</body>
</html>
